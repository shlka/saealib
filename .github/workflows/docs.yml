name: Docs

on:
  push:
    branches: ["main", "dev-docs"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build docs (strict)
        run: uv run sphinx-build -W -b html docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html/
          retention-days: 7

  deploy-dev:
    name: Deploy dev docs (main)
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build rolling "dev" docs (en)
        run: uv run sphinx-build -b html docs docs/_build/html/dev

      - name: Build rolling "dev" docs (ja)
        run: uv run sphinx-build -b html -D language=ja docs docs/_build/html/ja/dev

      # destination_dir scopes each deploy to that subdirectory only, leaving
      # everything else on gh-pages (vX.Y.Z/ snapshots, versions.json,
      # root index.html) untouched. versions.json/index.html are only
      # (re)generated by deploy-release below, since the version list only
      # changes when a tag is pushed.
      - name: Deploy dev docs (en) to gh-pages:/dev/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html/dev
          destination_dir: dev

      - name: Deploy dev docs (ja) to gh-pages:/ja/dev/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html/ja/dev
          destination_dir: ja/dev

  create-release-branch:
    name: Create/sync release/vX.Y.x maintenance branch (final release only)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Only final releases (vX.Y.Z, no pre-release suffix) get a branch.
      # While main is still shipping patches for a minor series (this tag is
      # an ancestor of main), release/vX.Y.x tracks main: created on the
      # first final tag, fast-forwarded on every later one. Once main has
      # moved past that minor series, or once release/vX.Y.x has its own
      # maintenance commits (a tag cut directly from the branch, not from
      # main), it's left untouched — that's an intentional divergence, not a
      # sync target.
      - name: Create or fast-forward release/vX.Y.x when this tag is on main
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            BRANCH="release/v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.x"
            if ! git merge-base --is-ancestor "$TAG" origin/main; then
              echo "$TAG is not on main (likely cut from an existing $BRANCH) — skipping."
            elif git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
              git fetch origin "$BRANCH"
              if git merge-base --is-ancestor "origin/$BRANCH" "$TAG"; then
                git push origin "$TAG:refs/heads/$BRANCH"
                echo "Fast-forwarded $BRANCH to $TAG."
              else
                echo "$BRANCH has diverged from main (has its own maintenance commits) — not touching it."
              fi
            else
              git branch "$BRANCH" "$TAG"
              git push origin "$BRANCH"
              echo "Created $BRANCH from $TAG."
            fi
          else
            echo "Tag $TAG is a pre-release or does not match vX.Y.Z — skipping."
          fi

  deploy-release:
    name: Deploy release (tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build final-release snapshots with sphinx-multiversion (en)
        run: |
          if git tag -l 'v*' | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            uv run sphinx-multiversion docs docs/_build/html
          else
            echo "No final release tags yet (pre-1.0) — skipping multiversion snapshot build."
            mkdir -p docs/_build/html
          fi

      - name: Build final-release snapshots with sphinx-multiversion (ja)
        run: |
          if git tag -l 'v*' | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            uv run sphinx-multiversion -D language=ja docs docs/_build/html/ja
          else
            echo "No final release tags yet (pre-1.0) — skipping multiversion snapshot build."
            mkdir -p docs/_build/html/ja
          fi

      - name: Build rolling "dev" docs for this tag (en)
        run: uv run sphinx-build -b html docs docs/_build/html/dev

      - name: Build rolling "dev" docs for this tag (ja)
        run: uv run sphinx-build -b html -D language=ja docs docs/_build/html/ja/dev

      - name: Generate versions.json for the version-switcher menu
        run: |
          # Schema required by pydata-sphinx-theme's version-switcher.html:
          # each entry needs "version" (matched against
          # theme_switcher_version_match, set dynamically in conf.py) and
          # "url" (absolute URL to that version's docs root; the theme's JS
          # appends the current page's relative path to it). "name" is the
          # display label; "preferred" marks the version shown by default in
          # the version-warning banner and matches the target of the root
          # redirect below.
          BASE_URL="https://shlka.github.io/saealib"
          LATEST=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          PREFERRED=${LATEST:-dev}
          {
            echo -n "[{\"version\": \"dev\", \"name\": \"dev\", \"url\": \"${BASE_URL}/dev/\""
            [ "$PREFERRED" = "dev" ] && echo -n ', "preferred": true'
            echo -n '}'
            for TAG in $(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -Vr); do
              echo -n ", {\"version\": \"${TAG}\", \"name\": \"${TAG}\", \"url\": \"${BASE_URL}/${TAG}/\""
              [ "$TAG" = "$PREFERRED" ] && echo -n ', "preferred": true'
              echo -n '}'
            done
            echo ']'
          } > docs/_build/html/versions.json

      - name: Create root redirect to latest final release (or dev/ pre-1.0)
        run: |
          TARGET=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          TARGET=${TARGET:-dev}
          {
            echo '<!DOCTYPE html>'
            echo '<html><head>'
            echo '  <meta charset="utf-8">'
            echo "  <title>Redirecting to ${TARGET}...</title>"
            echo "  <link rel=\"canonical\" href=\"${TARGET}/\" />"
            echo "  <noscript><meta http-equiv=\"refresh\" content=\"0; url=${TARGET}/\"></noscript>"
            echo '  <script>'
            echo "    var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();"
            echo "    var dest = lang.indexOf('ja') === 0 ? 'ja/${TARGET}/' : '${TARGET}/';"
            echo '    location.replace(dest);'
            echo '  </script>'
            echo '</head><body>'
            echo "  <p>Redirecting to <a href=\"${TARGET}/\">${TARGET}</a> (or <a href=\"ja/${TARGET}/\">日本語</a>)</p>"
            echo '</body></html>'
          } > docs/_build/html/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
