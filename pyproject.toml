[project]
name = "saealib"
version = "0.1.0"
description = "A Python library for Surrogate-Assisted Evolutionary Algorithms (SAEAs)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.22.1",
    "scipy>=1.0.0",
    "typing-extensions>=4.15.0",
]
authors = [
    { name = "shlka", email = "sazakurosulp36@gmail.com" }
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saealib"]

[dependency-groups]
dev = [
    "opfunu>=1.0.4",
    "pytest>=9.0.2",
    "setuptools>=80.9.0",
    "ruff",
]
docs = [
    "furo>=2025.12.19",
    "myst-parser>=4.0.1",
    "sphinx>=8.1.3",
    "sphinx-copybutton>=0.5.2",
    "sphinx-design>=0.6.1",
    "sphinx-intl>=2.3.0",
    "sphinx-multiversion>=0.2.4",
    "sphinxcontrib-mermaid>=1.0.0",
]

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
select = [
    "F",
    "E",
    "W",
    "I",
    "N",
    "D",
    "UP",
    "NPY",
    "SIM",
    "RUF",
]

ignore = [
    "D100",
    "D104",
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["D", "N802"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
